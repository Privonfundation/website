
<!DOCTYPE html>
<html lang="ro" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ObscuritySecurity | Modern Sovereignty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Fragment+Mono&display=swap');
      
      :root {
        --neon: #39FF14;
        --deep: #000000;
      }

      body {
        font-family: 'Geist', sans-serif;
        background-color: var(--deep);
        color: #fff;
        margin: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        touch-action: manipulation;
      }

      #root {
        contain: paint layout;
      }

      .font-mono { font-family: 'Fragment Mono', monospace; }

      .bg-blueprint {
        background-image: 
          radial-gradient(rgba(57, 255, 20, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        contain: strict;
      }

      .fluid-h1 {
        font-size: clamp(2.2rem, 10vw, 9rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .reveal-text {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s cubic-bezier(0.2, 1, 0.3, 1), transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        will-change: transform, opacity;
      }
      .reveal-text.active {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes glitch-crackle {
        0% { transform: translate(0); opacity: 1; filter: hue-rotate(0deg); }
        10% { transform: translate(-5px, 2px); opacity: 0.8; }
        20% { transform: translate(5px, -2px); filter: hue-rotate(90deg); }
        30% { transform: translate(-2px, 5px); clip-path: inset(10% 0 30% 0); }
        40% { transform: translate(2px, -5px); opacity: 0.9; }
        50% { transform: translate(-8px, 0); filter: invert(0.1); }
        60% { transform: translate(8px, 2px); clip-path: inset(40% 0 10% 0); }
        70% { transform: translate(-2px, -8px); opacity: 1; }
        80% { transform: translate(5px, 5px); filter: hue-rotate(180deg); }
        90% { transform: translate(-5px, -5px); clip-path: inset(0 0 70% 0); }
        100% { transform: translate(0); opacity: 1; }
      }

      .animate-glitch-active {
        animation: glitch-crackle 0.15s infinite;
      }

      @keyframes logo-reveal {
        0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
        100% { transform: scale(1); opacity: 1; filter: blur(0); }
      }

      @keyframes mask-reveal {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }

      .animate-logo-entry {
        animation: logo-reveal 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
      }

      .animate-mask-entry {
        animation: mask-reveal 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        animation-delay: 0.4s;
        opacity: 0;
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
      
      .animate-laser-move { animation: laser-move 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .animate-scan { animation: scan 4s linear infinite; }
      .outline-text { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes menu-item-reveal {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-menu-item {
        animation: menu-item-reveal 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
      }
      
      @keyframes underline-expand {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      .animate-underline {
        animation: underline-expand 0.7s cubic-bezier(0.2, 1, 0.3, 1) forwards;
      }
      
      @keyframes laser-move {
        0% { left: -100%; opacity: 0; }
        50% { opacity: 1; }
        100% { left: 100%; opacity: 0; }
      }
      @keyframes scan {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      .menu-item {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s cubic-bezier(0.2, 1, 0.3, 1), transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
      }
      .menu-overlay-visible .menu-item {
        opacity: 1;
        transform: translateY(0);
      }

      .menu-underline {
        width: 0%;
        transition: width 0.7s cubic-bezier(0.2, 1, 0.3, 1);
      }
      .menu-overlay-visible .menu-underline {
        width: 100%;
      }

      .menu-footer {
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.6s cubic-bezier(0.2, 1, 0.3, 1), transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
      }
      .menu-overlay-visible .menu-footer {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes menu-item-in {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes menu-underline-in {
        from { width: 0%; }
        to { width: 100%; }
      }
      @keyframes menu-footer-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      @keyframes menuItemIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes verse-float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes verse-float-reverse {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(8px); }
      }
      .animate-verse-float {
        animation: verse-float 5s ease-in-out infinite;
      }
      .animate-verse-float-reverse {
        animation: verse-float-reverse 5s ease-in-out infinite;
      }

      @keyframes glitch-protocol {
        0%, 85%, 100% { transform: translate(0); clip-path: inset(0); }
        87% { transform: translate(-4px, 1px) skewX(-2deg); clip-path: inset(10% 0 60% 0); }
        89% { transform: translate(4px, -1px) skewX(2deg); clip-path: inset(40% 0 10% 0); }
        91% { transform: translate(-2px, 3px); clip-path: inset(70% 0 5% 0); }
        93% { transform: translate(2px, -2px) skewX(-1deg); clip-path: inset(15% 0 45% 0); }
        95% { transform: translate(-1px, 1px); clip-path: inset(50% 0 20% 0); }
        97% { transform: translate(1px, -1px); }
      }
      .animate-glitch-protocol {
        display: inline-block;
        animation: glitch-protocol 3s ease-in-out infinite;
      }

      @keyframes nod-confirm {
        0% { transform: translateY(0) rotateX(0); }
        20% { transform: translateY(-6px) rotateX(-4deg); }
        40% { transform: translateY(2px) rotateX(2deg); }
        60% { transform: translateY(-3px) rotateX(-2deg); }
        80% { transform: translateY(1px) rotateX(1deg); }
        100% { transform: translateY(0) rotateX(0); }
      }
      .animate-nod {
        display: inline-block;
        animation: nod-confirm 2s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        transform-origin: bottom center;
      }

      @keyframes scroll-ticker {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes scroll-ticker-reverse {
        0% { transform: translateX(-50%); }
        100% { transform: translateX(0); }
      }
      .animate-scroll-ticker {
        animation: scroll-ticker 25s linear infinite;
        will-change: transform;
      }
      .animate-scroll-ticker-reverse {
        animation: scroll-ticker-reverse 25s linear infinite;
        will-change: transform;
      }
      .group:hover .animate-scroll-ticker,
      .group:hover .animate-scroll-ticker-reverse {
        animation-play-state: paused;
      }
    </style>

  }
}
</script>

</head>

</html>
